[package]
edition = "2021"
name = "solana-account-info"
version = "2.2.1"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
description = "Solana AccountInfo and related definitions."
homepage = "https://anza.xyz/"
documentation = "https://docs.rs/solana-account-info"
license = "Apache-2.0"
repository = "https://github.com/anza-xyz/agave"

[lib]
name = "solana_account_info"
path = "src/lib.rs"

[dependencies]
bincode = { version = "1.3.3", optional = true }
serde = { version = "1.0.217", optional = true }
solana-program-error = "2.2.1"
solana-program-memory = "2.2.1"
solana-pubkey = { version = "2.2.1", default-features = false }

[features]
bincode = ["dep:bincode", "dep:serde"]
